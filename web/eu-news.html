<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новини — ОП + Фондове БГ</title>
    <meta name="description" content="Последни новини за EU финансиране и програми за България.">
    <link rel="canonical" href="https://tools.gdprcheck.bg/eu-news">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; color: #1a1a1a; }

        .news-header {
            background: #c0392b;
            color: white;
            padding: 0;
        }
        .news-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            max-width: 860px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 8px;
        }
        .news-header-top a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 13px;
        }
        .news-header-top a:hover { color: white; }
        .news-title-bar {
            background: #a93226;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding: 14px 20px;
        }
        .news-title-bar .inner {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            align-items: baseline;
            gap: 16px;
        }
        .news-title-bar h1 {
            font-size: 26px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.3px;
        }
        .news-title-bar .updated {
            font-size: 12px;
            color: rgba(255,255,255,0.65);
        }

        .filter-bar {
            background: #222;
            padding: 0 20px;
        }
        .filter-bar .inner {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            gap: 0;
        }
        .filter-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.15s;
            letter-spacing: 0.2px;
        }
        .filter-btn:hover { color: white; }
        .filter-btn.active { color: white; border-bottom-color: #c0392b; }

        .main {
            max-width: 860px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .news-list { display: flex; flex-direction: column; }

        .news-item {
            background: white;
            border-bottom: 1px solid #e8e8e8;
            padding: 16px 20px;
            transition: background 0.1s;
        }
        .news-item:first-child { border-radius: 6px 6px 0 0; }
        .news-item:last-child { border-bottom: none; border-radius: 0 0 6px 6px; }
        .news-item:hover { background: #fafafa; }

        .news-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .source-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 3px;
            background: #c0392b;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .source-tag.en { background: #2c3e50; }
        .news-date {
            font-size: 12px;
            color: #888;
        }
        .news-item h3 {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 5px;
        }
        .news-item h3 a {
            color: #1a1a1a;
            text-decoration: none;
        }
        .news-item h3 a:hover { color: #c0392b; }
        .news-desc {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        .empty { text-align: center; padding: 60px 20px; color: #888; }
        .disclaimer {
            font-size: 11px;
            color: #999;
            margin-top: 16px;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 520px) {
            .news-item { padding: 14px 14px; }
            .news-title-bar h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="news-header">
    <div class="news-header-top">
        <a href="/">← ОП + Фондове БГ</a>
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="/resources" style="background:#16a34a;color:white;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;">🔗 Полезни ресурси</a>
            <span id="updated-note" style="font-size:12px;color:rgba(255,255,255,0.6);">Зареждане...</span>
        </div>
    </div>
    <div class="news-title-bar">
        <div class="inner">
            <h1>Новини</h1>
        </div>
    </div>
</div>

<div class="filter-bar">
    <div class="inner">
        <button class="filter-btn active" onclick="filterNews('all', this)">Всички</button>
        <button class="filter-btn" onclick="filterNews('eu', this)">🇪🇺 EU за България</button>
        <button class="filter-btn" onclick="filterNews('вътрешни', this)">🇧🇬 Вътрешни</button>
        <button class="filter-btn" onclick="filterNews('en', this)">EN</button>
    </div>
</div>

<div class="main">
    <div class="news-list" id="news-list">
        <div class="empty">Зареждане...</div>
    </div>
    <p class="disclaimer">
        Новините са агрегирани от публични RSS feeds. Цялото съдържание принадлежи на съответните издатели — следвайте линковете за пълния текст.
    </p>
</div>

<script>
let allNews = [];

async function loadNews() {
    try {
        const res = await fetch('/data/eu-news.json');
        if (!res.ok) throw new Error();
        const data = await res.json();
        allNews = data.items || [];
        document.getElementById('updated-note').textContent =
            `Обновено: ${data.updated || '—'} · ${allNews.length} статии`;
        renderNews(allNews);
    } catch(e) {
        document.getElementById('news-list').innerHTML =
            '<div class="empty">Данните не са налични. Пусни <code>python scrape_eu_news.py</code></div>';
    }
}

function renderNews(items) {
    const list = document.getElementById('news-list');
    if (!items.length) {
        list.innerHTML = '<div class="empty">Няма статии.</div>';
        return;
    }
    list.innerHTML = items.map(item => `
        <div class="news-item">
            <div class="news-meta">
                <span class="source-tag ${item.lang === 'en' ? 'en' : ''}">${esc(item.source)}</span>
                ${item.date ? `<span class="news-date">${fmtDate(item.date)}</span>` : ''}
            </div>
            <h3><a href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">${esc(item.title)}</a></h3>
            ${item.desc ? `<p class="news-desc">${esc(item.desc)}${item.desc.length >= 299 ? '…' : ''}</p>` : ''}
        </div>`).join('');
}

function filterNews(filter, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (filter === 'all') renderNews(allNews);
    else if (filter === 'en') renderNews(allNews.filter(n => n.lang === 'en'));
    else renderNews(allNews.filter(n => n.topic === filter));
}

function fmtDate(iso) {
    if (!iso || iso.length < 10) return iso;
    const [y, m, d] = iso.split('-');
    const mo = ['яну','фев','мар','апр','май','юни','юли','авг','сеп','окт','ное','дек'];
    return `${parseInt(d)} ${mo[parseInt(m)-1]} ${y}`;
}

function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadNews();
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
