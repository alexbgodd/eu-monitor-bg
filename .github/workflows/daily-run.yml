name: Daily scrape and alerts

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC ≈ 08:00/09:00 бг. време
  workflow_dispatch: {}    # позволява ръчно пускане от Actions таба, за тест

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper + send alerts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_LOGIN: ${{ secrets.SMTP_LOGIN }}
          SMTP_KEY: ${{ secrets.SMTP_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scraper/send_alerts.py

      - name: Commit updated data (ако има промяна)
        run: |
          git config user.name "eu-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/programs.json
          git diff --staged --quiet || git commit -m "chore: automated scrape update $(date -u +%Y-%m-%d)"
          git push
